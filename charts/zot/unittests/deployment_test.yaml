suite: deployment tests
templates:
  - deployment.yaml
release:
  name: my-release
tests:
  - it: should create deployment when persistence is disabled
    set:
      persistence: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment

  - it: should not create deployment when persistence is enabled
    set:
      persistence: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should not set GODEBUG env var when fips140 is false
    set:
      fips140: false
      env:
        - name: MY_VAR
          value: "my-value"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: GODEBUG
            value: "fips140=only"

  - it: should set GODEBUG=fips140=only env var when fips140 is true
    set:
      fips140: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GODEBUG
            value: "fips140=only"

  - it: should include both GODEBUG and user-defined env vars when fips140 is true
    set:
      fips140: true
      env:
        - name: MY_VAR
          value: "my-value"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GODEBUG
            value: "fips140=only"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_VAR
            value: "my-value"

  - it: GODEBUG env var should be first when fips140 is true
    set:
      fips140: true
      env:
        - name: MY_VAR
          value: "my-value"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: GODEBUG
